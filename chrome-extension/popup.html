<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to only.link</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
      background: oklch(98% 0.008 60);
      color: oklch(18% 0.012 60);
      padding: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid oklch(92% 0.006 60);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: oklch(99.5% 0.004 60);
      transition: border-color 150ms;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: oklch(56% 0.18 250);
    }

    .form-textarea {
      min-height: 70px;
      resize: vertical;
    }

    .form-helper {
      font-size: 12px;
      color: oklch(52% 0.008 60);
      margin-top: 4px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms;
      font-family: inherit;
    }

    .btn-primary {
      background: oklch(56% 0.18 250);
      color: white;
    }

    .btn-primary:hover {
      background: oklch(51% 0.18 250);
    }

    .btn-primary:disabled {
      background: oklch(52% 0.008 60);
      cursor: not-allowed;
    }

    .alert {
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .alert-error {
      background: oklch(95% 0.04 25);
      color: oklch(48% 0.18 25);
      border: 1px solid oklch(90% 0.08 25);
    }

    .alert-success {
      background: oklch(95% 0.04 145);
      color: oklch(48% 0.16 145);
      border: 1px solid oklch(90% 0.08 145);
    }

    .hidden {
      display: none;
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 600ms linear infinite;
      margin-left: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .login-prompt {
      text-align: center;
      padding: 40px 20px;
    }

    .login-prompt h2 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .login-prompt p {
      color: oklch(52% 0.008 60);
      margin-bottom: 16px;
      font-size: 13px;
    }

    .link {
      color: oklch(56% 0.18 250);
      text-decoration: none;
      font-size: 13px;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="login-prompt" class="login-prompt hidden">
    <h2>🔒 Sign in required</h2>
    <p>You need to be logged in to save bookmarks.</p>
    <a href="https://onlylinks.id/app" class="btn btn-primary" target="_blank">Sign in to only.link</a>
  </div>

  <div id="save-form-container">
    <h1>Save to only.link</h1>

    <div id="error-alert" class="alert alert-error hidden"></div>
    <div id="success-alert" class="alert alert-success hidden"></div>

    <form id="save-form">
      <div class="form-group">
        <label class="form-label" for="url">URL</label>
        <input type="url" class="form-input" id="url" required readonly>
      </div>

      <div class="form-group">
        <label class="form-label" for="title">Title</label>
        <input type="text" class="form-input" id="title" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="description">Description (optional)</label>
        <textarea class="form-textarea" id="description"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="tags">Tags</label>
        <input type="text" class="form-input" id="tags" placeholder="comma, separated, tags">
        <p class="form-helper">Separate tags with commas</p>
      </div>

      <div class="form-group">
        <label class="checkbox-group">
          <input type="checkbox" id="is-public" checked>
          <span class="form-label" style="margin: 0;">Public bookmark</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary" id="save-btn">
        Save bookmark
      </button>
    </form>

    <p style="text-align: center; margin-top: 16px;">
      <a href="https://onlylinks.id/app" class="link" target="_blank">View all bookmarks →</a>
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
