<!-- BOOKMARK MODAL -->
<div class="modal" id="bookmark-modal">
  <div class="modal-backdrop"></div>
  <div class="modal-content" style="max-width: 600px;">
    <button class="modal-close" id="bookmark-modal-close">✕</button>
    <div class="modal-header">
      <h2 class="modal-title">Add new bookmark</h2>
    </div>
    <div class="modal-body">
      <form id="bookmark-form">
        <div class="form-group">
          <label class="form-label" for="bookmark-url">URL</label>
          <input
            type="text"
            class="form-input"
            id="bookmark-url"
            placeholder="example.com or https://example.com"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="bookmark-title">Title</label>
          <input
            type="text"
            class="form-input"
            id="bookmark-title"
            placeholder="A great article"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="bookmark-description">Description</label>
          <textarea
            class="form-textarea"
            id="bookmark-description"
            placeholder="What's this about?"
          ></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="bookmark-tags">Tags</label>
          <input
            type="text"
            class="form-input"
            id="bookmark-tags"
            placeholder="design, frontend, inspiration (comma-separated)"
          >
        </div>
        <div class="form-group">
          <div class="toggle-container">
            <div>
              <div class="toggle-label">Public link</div>
              <div class="toggle-description">Anyone can see this bookmark</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="bookmark-is-public" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary bookmark-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="bookmark-submit">Save bookmark</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- DELETE CONFIRMATION MODAL -->
<div class="modal" id="delete-confirmation-modal">
  <div class="modal-backdrop"></div>
  <div class="modal-content" style="max-width: 440px;">
    <button class="modal-close delete-cancel">✕</button>
    <div class="modal-header">
      <h2 class="modal-title">Delete bookmark?</h2>
    </div>
    <div class="modal-body">
      <p style="font-size: var(--text-base); color: var(--fg); line-height: 1.6;">
        This will permanently delete this bookmark. This action cannot be undone.
      </p>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary delete-cancel">Cancel</button>
      <button type="button" class="btn btn-danger" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>
