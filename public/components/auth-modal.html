<div id="auth-modal" class="modal">
  <div class="modal-backdrop"></div>
  <div class="modal-content am-modal-content">
    <button class="am-close" id="auth-modal-close" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="am-tabs" role="tablist">
      <button class="am-tab active" data-tab="login" role="tab" aria-selected="true">Sign in</button>
      <button class="am-tab" data-tab="register" role="tab" aria-selected="false">Create account</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" class="auth-form active" novalidate>
      <!-- Google OAuth -->
      <button type="button" class="am-google-btn" id="login-google-btn">
        <svg class="am-google-icon" viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <div class="am-divider"><span>or</span></div>

      <div class="am-field" id="lf-username-group">
        <label class="am-label" for="login-username">Username</label>
        <input class="am-input" type="text" id="login-username" autocomplete="username" autocapitalize="off" spellcheck="false" required>
        <span class="am-field-error" id="lf-username-error"></span>
      </div>

      <div class="am-field" id="lf-password-group">
        <label class="am-label" for="login-password">
          Password
          <button type="button" class="am-forgot" id="forgot-password-link">Forgot?</button>
        </label>
        <div class="am-input-wrap">
          <input class="am-input" type="password" id="login-password" autocomplete="current-password" required>
          <button type="button" class="am-eye" id="login-toggle-pw" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" id="login-eye-icon">
              <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          </button>
        </div>
        <span class="am-field-error" id="lf-password-error"></span>
      </div>

      <div class="am-form-error" id="login-global-error" role="alert" aria-live="polite"></div>

      <button type="submit" class="am-submit" id="login-submit">
        <span class="am-submit-label">Sign in</span>
        <span class="am-submit-spinner" aria-hidden="true"></span>
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" class="auth-form" novalidate>
      <!-- Google OAuth -->
      <button type="button" class="am-google-btn" id="signup-google-btn">
        <svg class="am-google-icon" viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <div class="am-divider"><span>or</span></div>

      <div class="am-field" id="sf-username-group">
        <label class="am-label" for="signup-username">Username</label>
        <div class="am-input-wrap">
          <input class="am-input" type="text" id="signup-username" autocomplete="username" autocapitalize="off" spellcheck="false"
            pattern="[a-zA-Z0-9_-]{3,20}" required>
          <span class="am-field-status" id="sf-username-status" aria-hidden="true"></span>
        </div>
        <span class="am-field-hint">3-20 chars: letters, numbers, _ or -</span>
        <span class="am-field-error" id="sf-username-error"></span>
      </div>

      <div class="am-field" id="sf-email-group">
        <label class="am-label" for="signup-email">Email</label>
        <input class="am-input" type="email" id="signup-email" autocomplete="email" placeholder="your@email.com" required>
        <span class="am-field-error" id="sf-email-error"></span>
      </div>

      <div class="am-field" id="sf-password-group">
        <label class="am-label" for="signup-password">Password</label>
        <div class="am-input-wrap">
          <input class="am-input" type="password" id="signup-password" autocomplete="new-password" required>
          <button type="button" class="am-eye" id="signup-toggle-pw" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          </button>
        </div>
        <!-- Password requirements checklist -->
        <ul class="am-reqs" id="sf-reqs" aria-label="Password requirements">
          <li class="am-req" id="req-length">At least 8 characters</li>
          <li class="am-req" id="req-uppercase">One uppercase letter</li>
          <li class="am-req" id="req-lowercase">One lowercase letter</li>
          <li class="am-req" id="req-number">One number</li>
          <li class="am-req" id="req-special">One special character</li>
        </ul>
        <span class="am-field-error" id="sf-password-error"></span>
      </div>

      <div class="am-field" id="sf-confirm-group">
        <label class="am-label" for="signup-confirm-password">Confirm password</label>
        <input class="am-input" type="password" id="signup-confirm-password" autocomplete="new-password" required>
        <span class="am-field-error" id="sf-confirm-error"></span>
      </div>

      <div class="am-form-error" id="signup-global-error" role="alert" aria-live="polite"></div>

      <button type="submit" class="am-submit" id="signup-submit">
        <span class="am-submit-label">Create account</span>
        <span class="am-submit-spinner" aria-hidden="true"></span>
      </button>
    </form>

    <!-- PASSWORD RESET FORM -->
    <form id="reset-form" class="auth-form" style="display:none;" novalidate>
      <p class="am-reset-desc">Enter your username or email and we'll send reset instructions.</p>
      <div class="am-field" id="rf-username-group">
        <label class="am-label" for="reset-username">Username or email</label>
        <input class="am-input" type="text" id="reset-username" autocomplete="email" autocapitalize="off" required>
        <span class="am-field-error" id="rf-username-error"></span>
      </div>
      <div class="am-form-error" id="reset-global-error" role="alert" aria-live="polite"></div>
      <div class="am-form-success" id="reset-success" role="status" aria-live="polite"></div>
      <button type="submit" class="am-submit" id="reset-submit">
        <span class="am-submit-label">Send instructions</span>
        <span class="am-submit-spinner" aria-hidden="true"></span>
      </button>
      <div class="am-back-row">
        <button type="button" class="am-back" id="back-to-login">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Back to sign in
        </button>
      </div>
    </form>
  </div>
</div>
