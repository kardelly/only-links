<header class="header" id="site-header">
  <div class="header-container">
    <a href="/" class="logo" id="logo-home">
      <img src="/logo.png" alt="only.link" class="logo-img">
    </a>

    <!-- Search: only visible when logged in -->
    <div class="search-container" id="header-search">
      <input
        type="search"
        class="search-input"
        id="search-input"
        placeholder="Search bookmarks, tags, or users..."
        autocomplete="off"
      >
      <div class="search-users-dropdown" id="search-users-dropdown" hidden></div>
    </div>

    <nav class="nav">
      <!-- Guest nav: landing style (Features + Sign in + Get started) -->
      <div id="guest-nav">
        <a href="/#features" class="nav-link">Features</a>
        <button class="btn btn-ghost" id="login-btn">Sign in</button>
        <button class="btn btn-primary" id="signup-btn">Get started</button>
      </div>

      <!-- Auth nav: app style -->
      <div id="auth-nav">
        <button class="btn btn-primary" id="new-bookmark-btn">+ New bookmark</button>

        <!-- Notifications bell — only shown when logged in -->
        <div class="notif-bell-wrapper" id="notif-bell-wrapper" style="display:none">
          <button class="notif-bell-btn" id="notif-bell-btn" aria-label="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notif-badge" id="notif-badge" style="display:none"></span>
          </button>
          <div class="notif-dropdown" id="notif-dropdown" hidden>
            <div class="notif-dropdown-header">
              <span class="notif-dropdown-title">Notifications</span>
              <button class="notif-mark-all-btn" id="notif-mark-all-btn">Mark all read</button>
            </div>
            <div class="notif-list" id="notif-list">
              <p class="notif-empty">No notifications yet.</p>
            </div>
          </div>
        </div>

        <div class="profile-dropdown">
          <button class="profile-avatar-btn" id="profile-avatar-btn">
            <span id="profile-avatar-initial">U</span>
          </button>

          <div class="profile-menu" id="profile-menu">
            <a href="#" class="profile-menu-item" id="profile-menu-header-link">
              <span>◉</span>
              <span>Profile</span>
            </a>
            <a href="/settings" class="profile-menu-item">
              <span>⚙</span>
              <span>Settings</span>
            </a>
            <div class="profile-menu-separator"></div>
            <a href="/extension" class="profile-menu-item">
              <span>⊞</span>
              <span>Chrome Extension</span>
            </a>
            <a href="/bookmarklet" class="profile-menu-item">
              <span>☆</span>
              <span>Bookmarklet</span>
            </a>
            <div class="profile-menu-separator"></div>
            <button class="profile-menu-item" id="logout-btn">
              <span>→</span>
              <span>Sign out</span>
            </button>
          </div>
        </div>
      </div>
    </nav>
  </div>
</header>
