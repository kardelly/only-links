<header class="header">
  <div class="header-container">
    <a href="/" class="logo" id="logo-home">
      <img src="/logo.png" alt="only.link" class="logo-img">
    </a>

    <div class="search-container">
      <input
        type="search"
        class="search-input"
        id="search-input"
        placeholder="Search bookmarks, tags, or users..."
      >
    </div>

    <nav class="nav">
      <div id="guest-nav">
        <a href="/extension" class="btn btn-ghost" style="text-decoration: none;">Extension</a>
        <button class="btn btn-ghost" id="login-btn">Login</button>
        <button class="btn btn-primary" id="signup-btn">Sign up</button>
      </div>

      <div id="auth-nav">
        <button class="btn btn-primary" id="new-bookmark-btn">+ New bookmark</button>

        <div class="profile-dropdown">
          <button class="profile-avatar-btn" id="profile-avatar-btn">
            <span id="profile-avatar-initial">U</span>
          </button>

          <div class="profile-menu" id="profile-menu">
            <a href="#" class="profile-menu-header" id="profile-menu-header-link">
              <div class="profile-menu-username" id="profile-menu-username">@username</div>
            </a>
            <div class="profile-menu-separator"></div>
            <a href="#" class="profile-menu-item" id="profile-link">
              <span>◉</span>
              <span>Profile</span>
            </a>
            <a href="/settings" class="profile-menu-item">
              <span>⚙</span>
              <span>Settings</span>
            </a>
            <div class="profile-menu-separator"></div>
            <a href="/extension" class="profile-menu-item">
              <span>⊞</span>
              <span>Chrome Extension</span>
            </a>
            <a href="/bookmarklet" class="profile-menu-item">
              <span>☆</span>
              <span>Bookmarklet</span>
            </a>
            <div class="profile-menu-separator"></div>
            <button class="profile-menu-item" id="logout-btn">
              <span>→</span>
              <span>Sign out</span>
            </button>
          </div>
        </div>
      </div>
    </nav>
  </div>
</header>
