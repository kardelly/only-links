<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1E3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f5a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo mark (bookmark icon) -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="56" height="68" rx="8" fill="none" stroke="#4F6FE8" stroke-width="4"/>
    <polyline points="0,68 28,48 56,68" fill="#4F6FE8" stroke="none"/>
  </g>

  <!-- onlylinks wordmark -->
  <text x="172" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-0.5">onlylinks</text>

  <!-- Main headline -->
  <text x="100" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-2">Save.</text>
  <text x="100" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-2">Tag.</text>
  <text x="100" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#4F6FE8" letter-spacing="-2" font-style="italic">Discover.</text>

  <!-- Tagline -->
  <text x="100" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8899bb" letter-spacing="0">Social bookmarking for the endlessly curious. Free forever.</text>

  <!-- URL badge -->
  <rect x="900" y="540" width="200" height="48" rx="24" fill="#4F6FE8" opacity="0.15"/>
  <text x="1000" y="569" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#4F6FE8" text-anchor="middle" letter-spacing="0">onlylinks.id</text>
</svg>
