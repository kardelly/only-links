  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Neutrals — warm tint (hue 60 amber) */
      --bg:      oklch(98% 0.008 60);
      --surface: oklch(99.5% 0.004 60);
      --fg:      oklch(18% 0.012 60);
      --muted:   oklch(52% 0.008 60);
      --border:  oklch(92% 0.006 60);

      /* Accent — cobalt blue */
      --accent:  oklch(56% 0.18 250);
      --accent-hover: oklch(51% 0.18 250);
      --accent-subtle: oklch(96% 0.02 250);

      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Helvetica Neue", sans-serif;

      /* Spacing (4px base) */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;

      /* Text scale (1.25 ratio) */
      --text-xs:   13px;
      --text-sm:   14px;
      --text-base: 16px;
      --text-lg:   20px;
      --text-xl:   25px;
      --text-2xl:  31px;

      /* Motion */
      --transition: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 150ms;
      --duration-base: 200ms;
      --duration-slow: 300ms;

      /* Elevation */
      --shadow-sm: 0 1px 3px oklch(18% 0.012 60 / 0.08);
      --shadow-md: 0 4px 12px oklch(18% 0.012 60 / 0.1);
      --shadow-lg: 0 8px 24px oklch(18% 0.012 60 / 0.12);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      height: 40px;
      padding: 0 var(--space-6);
      font-size: var(--text-base);
      font-weight: 600;
      border-radius: 980px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all var(--duration-fast) var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 1px 3px oklch(from var(--accent) l c h / 0.25);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 2px 6px oklch(from var(--accent) l c h / 0.3);
    }

    .btn-primary:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 1px 2px oklch(from var(--accent) l c h / 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary.loading {
      position: relative;
      color: transparent;
      pointer-events: none;
    }

    .btn-primary.loading::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      top: 50%;
      left: 50%;
      margin-left: -8px;
      margin-top: -8px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: btnSpinner 600ms linear infinite;
    }

    @keyframes btnSpinner {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn-primary.loading::after {
        animation: none;
        border-top-color: white;
      }
    }

    .btn-secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface);
      border-color: oklch(88% 0.008 60);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
    }

    .btn-ghost:hover {
      color: var(--fg);
      background: var(--surface);
    }

    .btn-sm {
      height: 32px;
      padding: 0 var(--space-4);
      font-size: var(--text-sm);
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-6);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: var(--space-12);
      align-items: start;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }

    /* ===== FEED ===== */
    .feed {
      min-height: 60vh;
    }

    .feed-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-8);
    }

    .filter-tabs {
      display: flex;
      gap: var(--space-2);
      padding: var(--space-1);
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .filter-tab {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 600;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--duration-fast) var(--transition);
    }

    .filter-tab:hover {
      color: var(--fg);
    }

    .filter-tab.active {
      background: white;
      color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    /* ===== BOOKMARK ITEMS ===== */
    .bookmark-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .bookmark-item {
      position: relative;
      padding: var(--space-5, 20px) var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      gap: var(--space-4);
      transition: box-shadow var(--duration-fast) var(--transition),
                  border-color var(--duration-fast) var(--transition),
                  transform var(--duration-fast) var(--transition);
    }

    .bookmark-item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
      border-color: oklch(86% 0.008 60);
    }

    .bookmark-thumbnail {
      flex-shrink: 0;
      width: 96px;
      height: 64px;
      border-radius: 8px;
      overflow: hidden;
      background: oklch(94% 0.006 60);
      align-self: flex-start;
      margin-top: 2px;
    }

    .bookmark-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 300ms var(--transition);
    }

    .bookmark-item:hover .bookmark-thumbnail img {
      transform: scale(1.04);
    }

    .bookmark-content {
      flex: 1;
      min-width: 0;
    }

    .bookmark-header {
      margin-bottom: var(--space-2);
    }

    .bookmark-url {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
      display: block;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
      line-height: 1.35;
      transition: color var(--duration-fast) var(--transition);
    }

    .bookmark-url:hover {
      color: var(--accent);
    }

    .bookmark-domain {
      font-size: 12px;
      color: oklch(68% 0.006 60);
      letter-spacing: 0.01em;
    }

    .bookmark-description {
      font-size: var(--text-sm);
      line-height: 1.55;
      color: oklch(42% 0.008 60);
      margin-bottom: var(--space-3);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bookmark-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
      margin-bottom: var(--space-3);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px var(--space-2);
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 980px;
      color: oklch(52% 0.008 60);
      cursor: pointer;
      transition: border-color var(--duration-fast) var(--transition),
                  color var(--duration-fast) var(--transition),
                  background var(--duration-fast) var(--transition);
    }

    .tag:hover {
      border-color: oklch(from var(--accent) 80% 0.08 h);
      color: var(--accent);
      background: oklch(from var(--accent) 97% 0.02 h);
    }

    .bookmark-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 12px;
      color: oklch(62% 0.006 60);
    }

    .bookmark-meta-link {
      color: inherit;
      text-decoration: none;
      transition: color var(--duration-fast) var(--transition);
    }

    .bookmark-meta-link:hover {
      color: var(--accent);
    }

    .bookmark-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: sticky;
      top: calc(64px + var(--space-8));
    }

    .sidebar-section {
      margin-bottom: var(--space-10);
    }

    .sidebar-title {
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--space-3);
    }

    /* ===== MODALS ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 200;
      background: oklch(18% 0.012 60 / 0.4);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      animation: modalFadeIn var(--duration-slow) var(--transition);
    }

    .modal.active {
      display: flex;
    }

    .modal.exit {
      animation: modalFadeOut 200ms var(--transition) forwards;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes modalFadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    .modal-content {
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      animation: modalSlideUp var(--duration-slow) var(--transition);
    }

    /* ===== BOOKMARK MODAL (compact, no scroll) ===== */
    .bm-modal-content {
      max-height: none;
      overflow-y: visible;
      max-width: 520px;
      border-radius: 16px;
    }
    .bm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 0;
    }
    .bm-title {
      font-size: var(--text-base);
      font-weight: 650;
      letter-spacing: -0.01em;
      color: var(--fg);
    }
    .bm-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms ease, color 150ms ease, transform 150ms ease;
      flex-shrink: 0;
    }
    .bm-close:hover { background: oklch(88% 0.008 60); color: var(--fg); transform: rotate(90deg); }
    .bm-body { padding: 14px 20px 20px; }
    .bm-field { margin-bottom: 12px; }
    .bm-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .bm-optional { font-weight: 400; text-transform: none; letter-spacing: 0; opacity: 0.7; font-size: 11px; }
    .bm-input, .bm-textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font-sans);
      color: var(--fg);
      line-height: 1.5;
      transition: border-color 150ms ease, box-shadow 150ms ease;
      outline: none;
    }
    .bm-input:focus, .bm-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(56% 0.18 250 / 0.1);
    }
    .bm-textarea { resize: none; height: 58px; }
    .bm-url-wrap { position: relative; }
    .bm-url-wrap .bm-input { padding-right: 36px; }
    .bm-url-spinner, .bm-url-check {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .bm-url-spinner.active { display: flex; }
    .bm-url-spinner::after {
      content: '';
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: bm-spin 0.6s linear infinite;
    }
    @keyframes bm-spin { to { transform: rotate(360deg); } }
    .bm-url-check { color: var(--success); }
    .bm-url-check.active { display: flex; animation: bm-check-pop 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes bm-check-pop {
      from { opacity: 0; transform: translateY(-50%) scale(0.5); }
      to   { opacity: 1; transform: translateY(-50%) scale(1); }
    }
    .bm-title-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
    .bm-field-grow { flex: 1; margin-bottom: 0; }
    .bm-og-thumb {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--border);
      margin-top: 22px;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 300ms cubic-bezier(0.16, 1, 0.3, 1), transform 300ms cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }
    .bm-og-thumb.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
    .bm-og-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .bm-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      margin-top: 14px;
    }
    .bm-toggle-row { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .bm-toggle-input { position: absolute; opacity: 0; width: 0; height: 0; }
    .bm-toggle-track {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: var(--border);
      position: relative;
      transition: background 200ms ease;
      flex-shrink: 0;
    }
    .bm-toggle-input:checked ~ .bm-toggle-track { background: var(--accent); }
    .bm-toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 1px 3px oklch(18% 0.012 60 / 0.25);
      transition: transform 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bm-toggle-input:checked ~ .bm-toggle-track .bm-toggle-thumb { transform: translateX(14px); }
    .bm-toggle-text { font-size: 13px; font-weight: 510; color: var(--muted); }
    .bm-actions { display: flex; gap: 8px; }
    .bm-btn-cancel {
      height: 34px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      font-size: 13px;
      font-weight: 510;
      color: var(--muted);
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease;
    }
    .bm-btn-cancel:hover { background: var(--bg); color: var(--fg); }
    .bm-btn-save {
      height: 34px;
      padding: 0 18px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 150ms ease, transform 100ms ease;
    }
    .bm-btn-save:hover { background: oklch(51% 0.18 250); }
    .bm-btn-save:active { transform: translateY(1px); }
    .bm-btn-save:disabled { opacity: 0.6; cursor: default; }
    .bm-save-check { display: none; color: white; }
    .bm-btn-save.saving .bm-save-label { opacity: 0.5; }
    .bm-btn-save.done .bm-save-label { display: none; }
    .bm-btn-save.done .bm-save-check { display: flex; animation: bm-check-pop-btn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes bm-check-pop-btn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .bm-close, .bm-og-thumb, .bm-url-check, .bm-url-spinner::after,
      .bm-toggle-track, .bm-toggle-thumb, .bm-btn-save { transition: none; animation: none; }
    }

    .modal.exit .modal-content {
      animation: modalSlideDown 200ms var(--transition) forwards;
    }

    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes modalSlideDown {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(10px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .modal,
      .modal.exit,
      .modal-content,
      .modal.exit .modal-content {
        animation: none;
      }
    }

    .modal-header {
      padding: var(--space-6);
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    .modal-body {
      padding: var(--space-6);
    }

    .modal-footer {
      padding: var(--space-6);
      border-top: 1px solid var(--border);
      display: flex;
      gap: var(--space-3);
      justify-content: flex-end;
    }

    /* ===== FORMS ===== */
    .form-group {
      margin-bottom: var(--space-6);
    }

    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--fg);
      margin-bottom: var(--space-2);
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: var(--text-base);
      font-family: var(--font-sans);
      color: var(--fg);
      transition: all var(--duration-fast) var(--transition);
    }

    .form-input {
      height: 44px;
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.1);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--muted);
    }

    /* ===== SKELETON LOADING ===== */
    .skeleton-bookmark {
      padding: var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: var(--space-6);
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        oklch(95% 0.006 60) 0%,
        oklch(93% 0.006 60) 50%,
        oklch(95% 0.006 60) 100%
      );
      background-size: 200% 100%;
      animation: skeleton-pulse 1.5s ease-in-out infinite;
      border-radius: 6px;
    }

    @keyframes skeleton-pulse {
      0%, 100% {
        background-position: 200% 0;
      }
      50% {
        background-position: -200% 0;
      }
    }

    .skeleton-title {
      height: 20px;
      width: 70%;
      margin-bottom: var(--space-3);
    }

    .skeleton-url {
      height: 14px;
      width: 40%;
      margin-bottom: var(--space-4);
    }

    .skeleton-description {
      height: 16px;
      width: 100%;
      margin-bottom: var(--space-2);
    }

    .skeleton-tags {
      display: flex;
      gap: var(--space-2);
    }

    .skeleton-tag {
      height: 24px;
      width: 60px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: var(--space-16) var(--space-8);
      animation: emptyFadeIn 400ms var(--transition);
    }

    @keyframes emptyFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-6);
      color: var(--muted);
      opacity: 0.4;
      animation: iconFloat 3s ease-in-out infinite;
    }

    @keyframes iconFloat {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .empty-state-icon {
        animation: none;
      }
      .empty-state {
        animation: none;
      }
    }

    .empty-state-title {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-3);
      color: var(--fg);
    }

    .empty-state-description {
      font-size: var(--text-base);
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto var(--space-8);
      line-height: 1.6;
    }

    .empty-state-hint {
      font-size: var(--text-sm);
      color: var(--muted);
      margin-top: var(--space-4);
      opacity: 0.7;
    }

    .empty-state-kbd {
      display: inline-block;
      padding: 2px 6px;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin: 0 2px;
    }

    .empty-state .btn-primary {
      animation: emptyCtaPulse 2s ease-in-out 1s 1;
    }

    @keyframes emptyCtaPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 1px 3px oklch(from var(--accent) l c h / 0.25);
      }
      50% {
        transform: scale(1.02);
        box-shadow: 0 2px 8px oklch(from var(--accent) l c h / 0.35);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .empty-state .btn-primary {
        animation: none;
      }
    }

    /* Success Toast */
    .success-toast {
      position: fixed;
      top: var(--space-8);
      right: var(--space-8);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-6);
      background: var(--surface);
      border: 1px solid oklch(54% 0.15 145 / 0.3);
      border-radius: 10px;
      box-shadow: var(--shadow-md);
      font-size: var(--text-sm);
      font-weight: 510;
      color: var(--fg);
      z-index: 9999;
      animation: toastSlideIn 300ms var(--transition);
      pointer-events: none;
    }

    @keyframes toastSlideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .success-toast.exit {
      animation: toastSlideOut 250ms var(--transition) forwards;
    }

    @keyframes toastSlideOut {
      from {
        opacity: 1;
        transform: translateX(0);
      }
      to {
        opacity: 0;
        transform: translateX(100px);
      }
    }

    .success-toast-icon {
      width: 20px;
      height: 20px;
      color: oklch(54% 0.15 145);
      flex-shrink: 0;
    }

    .success-toast-icon svg {
      width: 100%;
      height: 100%;
    }

    /* Checkmark draw animation */
    .success-toast-icon .checkmark-path {
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
      animation: checkmarkDraw 400ms var(--transition) forwards;
    }

    @keyframes checkmarkDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .success-toast {
        animation: none;
      }
      .success-toast.exit {
        animation: none;
        opacity: 0;
      }
      .success-toast-icon .checkmark-path {
        animation: none;
        stroke-dashoffset: 0;
      }
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .success-toast {
        top: var(--space-6);
        right: var(--space-4);
        left: var(--space-4);
        justify-content: center;
      }
    }

    /* First bookmark celebration */
    @keyframes firstBookmarkCelebrate {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.9);
      }
      50% {
        transform: translateY(-4px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .bookmark-item.first-bookmark {
      animation: firstBookmarkCelebrate 500ms var(--transition);
    }

    /* ===== FILTER BANNER ===== */


    /* ===== TOGGLE SWITCH ===== */
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .toggle-label {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--fg);
    }

    .toggle-description {
      font-size: var(--text-sm);
      color: var(--muted);
      margin-top: var(--space-1);
    }

    .toggle-switch {
      position: relative;
      width: 51px;
      height: 31px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--border);
      transition: all var(--duration-fast) var(--transition);
      border-radius: 980px;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 27px;
      width: 27px;
      left: 2px;
      bottom: 2px;
      background: white;
      transition: all var(--duration-fast) var(--transition);
      border-radius: 50%;
      box-shadow: 0 1px 3px oklch(18% 0.012 60 / 0.2);
    }

    input:checked + .toggle-slider {
      background: var(--accent);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    input:focus + .toggle-slider {
      box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.1);
    }

    /* ===== UTILITIES ===== */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- AUTH MODAL -->
  <div id="auth-modal-placeholder"></div>

  <!-- MAIN CONTENT -->
  <main class="container">
    <div class="layout">

      <!-- FEED -->
      <div class="feed">
        <div class="feed-controls">
          <div class="filter-tabs">
            <button class="filter-tab active" data-feed="mine" id="feed-mine-btn" style="display: none;">My bookmarks</button>
            <button class="filter-tab" data-feed="network" id="feed-network-btn" style="display: none;">Network</button>
            <button class="filter-tab" data-feed="all" id="feed-all-btn">All bookmarks</button>
          </div>
        </div>

        <!-- ACTIVE TAGS FILTER -->
        <div id="active-tags-filter" class="active-tags-filter" style="display: none;">
          <span class="filter-label">Filter by</span>
          <div class="active-tags-pills" id="active-tags-pills"></div>
        </div>

        <!-- BOOKMARK LIST -->
        <div class="bookmark-list" id="bookmark-list">
          <!-- Loading skeleton -->
          <div class="skeleton-bookmark">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-url"></div>
            <div class="skeleton skeleton-description"></div>
            <div class="skeleton-tags">
              <div class="skeleton skeleton-tag"></div>
              <div class="skeleton skeleton-tag"></div>
              <div class="skeleton skeleton-tag"></div>
            </div>
          </div>
        </div>

        <!-- LOAD MORE BUTTON -->
        <div style="display: flex; justify-content: center; padding: var(--space-8) 0;">
          <button id="load-more-btn" class="btn btn-secondary" style="display: none;">
            Load more
          </button>
        </div>

      </div>

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div id="sidebar-tags-placeholder"></div>

        <div class="sidebar-section">
          <h3 class="sidebar-title">Quick save</h3>
          <p style="font-size: var(--text-sm); color: var(--muted); line-height: 1.6; margin-bottom: var(--space-4);">
            Drag this button to your bookmarks bar:
          </p>
          <a
            href="javascript:(function(){window.open('http://localhost:3000?url='+encodeURIComponent(window.location.href)+'&title='+encodeURIComponent(document.title),'_blank','width=600,height=500');})();"
            class="btn btn-secondary"
            style="width: 100%;"
            onclick="event.preventDefault(); alert('Drag this button to your bookmarks bar!');">
            + only.link
          </a>
        </div>
      </aside>
    </div>
  </main>

  <!-- AUTH MODAL -->
  <div class="modal" id="auth-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="auth-modal-title">Sign in</h2>
      </div>
      <div class="modal-body">
        <form id="auth-form">
          <div class="form-group">
            <label class="form-label" for="auth-username">Username</label>
            <input
              type="text"
              class="form-input"
              id="auth-username"
              placeholder="your-username"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="auth-password">Password</label>
            <input
              type="password"
              class="form-input"
              id="auth-password"
              placeholder="••••••••"
              required
            >
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="auth-modal-close">Cancel</button>
        <button class="btn btn-primary" id="auth-submit">Sign in</button>
      </div>
    </div>
  </div>

  <!-- BOOKMARK MODALS -->
  <div id="bookmark-modals-placeholder"></div>
  <div id="footer-placeholder"></div>

  <script src="/components/session.js"></script>
  <script src="/components/header.js"></script>
  <script src="/components/footer.js"></script>
  <script src="/components/auth-modal.js"></script>
  <script src="/components/bookmark-modals.js"></script>
  <script src="/components/sidebar-tags.js"></script>
  <script src="/app.js"></script>
</body>
</html>
