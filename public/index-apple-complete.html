<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>delicious — Your links</title>
  <meta name="description" content="Save, organize, and discover links.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Neutrals — warm tint (hue 60 amber) */
      --bg:      oklch(98% 0.008 60);
      --surface: oklch(99.5% 0.004 60);
      --fg:      oklch(18% 0.012 60);
      --muted:   oklch(52% 0.008 60);
      --border:  oklch(92% 0.006 60);

      /* Accent — cobalt blue */
      --accent:  oklch(56% 0.18 250);
      --accent-hover: oklch(51% 0.18 250);
      --accent-subtle: oklch(96% 0.02 250);

      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Helvetica Neue", sans-serif;

      /* Spacing (4px base) */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;

      /* Text scale (1.25 ratio) */
      --text-xs:   13px;
      --text-sm:   14px;
      --text-base: 16px;
      --text-lg:   20px;
      --text-xl:   25px;
      --text-2xl:  31px;

      /* Motion */
      --transition: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 150ms;
      --duration-base: 200ms;
      --duration-slow: 300ms;

      /* Elevation */
      --shadow-sm: 0 1px 3px oklch(18% 0.012 60 / 0.08);
      --shadow-md: 0 4px 12px oklch(18% 0.012 60 / 0.1);
      --shadow-lg: 0 8px 24px oklch(18% 0.012 60 / 0.12);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: oklch(from var(--bg) l c h / 0.85);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid oklch(from var(--border) l c h / 0.6);
    }

    .header-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 var(--space-6);
      height: 64px;
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--fg);
      flex-shrink: 0;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }

    .search-container {
      flex: 1;
      max-width: 480px;
    }

    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 var(--space-4);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: var(--text-base);
      color: var(--fg);
      transition: all var(--duration-fast) var(--transition);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.1);
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-left: auto;
    }

    /* Guest nav */
    #guest-nav {
      display: flex;
      gap: var(--space-3);
    }

    /* Auth nav */
    #auth-nav {
      display: none;
      gap: var(--space-3);
      align-items: center;
    }

    #username-display {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--muted);
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      height: 40px;
      padding: 0 var(--space-6);
      font-size: var(--text-base);
      font-weight: 600;
      border-radius: 980px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all var(--duration-fast) var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 1px 3px oklch(from var(--accent) l c h / 0.25);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 2px 6px oklch(from var(--accent) l c h / 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface);
      border-color: oklch(88% 0.008 60);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
    }

    .btn-ghost:hover {
      color: var(--fg);
      background: var(--surface);
    }

    .btn-sm {
      height: 32px;
      padding: 0 var(--space-4);
      font-size: var(--text-sm);
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-6);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: var(--space-12);
      align-items: start;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }

    /* ===== FEED ===== */
    .feed {
      min-height: 60vh;
    }

    .feed-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-8);
    }

    .filter-tabs {
      display: flex;
      gap: var(--space-2);
      padding: var(--space-1);
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .filter-tab {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 600;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--duration-fast) var(--transition);
    }

    .filter-tab:hover {
      color: var(--fg);
    }

    .filter-tab.active {
      background: white;
      color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    /* ===== BOOKMARK ITEMS ===== */
    .bookmark-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .bookmark-item {
      position: relative;
      padding: var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: all var(--duration-base) var(--transition);
    }

    .bookmark-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: oklch(88% 0.008 60);
    }

    .bookmark-header {
      margin-bottom: var(--space-3);
    }

    .bookmark-url {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
      display: block;
      margin-bottom: var(--space-1);
      letter-spacing: -0.01em;
    }

    .bookmark-url:hover {
      color: var(--accent);
    }

    .bookmark-domain {
      font-size: var(--text-sm);
      color: var(--muted);
    }

    .bookmark-description {
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: var(--space-4);
    }

    .bookmark-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: var(--space-1) var(--space-3);
      font-size: var(--text-xs);
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--duration-fast) var(--transition);
    }

    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-subtle);
    }

    .bookmark-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--muted);
    }

    .bookmark-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px solid var(--border);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: sticky;
      top: calc(64px + var(--space-8));
    }

    .sidebar-section {
      margin-bottom: var(--space-10);
    }

    .sidebar-title {
      font-size: var(--text-base);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-4);
    }

    .popular-tags {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .tag-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--transition);
    }

    .tag-item:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .tag-item-name {
      font-weight: 600;
      color: var(--fg);
    }

    .tag-item-count {
      font-size: var(--text-xs);
      color: var(--muted);
    }

    /* ===== PAGINATION ===== */
    .pagination {
      display: none;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-top: var(--space-12);
      padding-top: var(--space-8);
      border-top: 1px solid var(--border);
    }

    .pagination-info {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .pagination-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pagination-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ===== MODALS ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 200;
      background: oklch(18% 0.012 60 / 0.4);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      animation: modalFadeIn var(--duration-slow) var(--transition);
    }

    .modal.active {
      display: flex;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal-content {
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      animation: modalSlideUp var(--duration-slow) var(--transition);
    }

    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      padding: var(--space-6);
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    .modal-body {
      padding: var(--space-6);
    }

    .modal-footer {
      padding: var(--space-6);
      border-top: 1px solid var(--border);
      display: flex;
      gap: var(--space-3);
      justify-content: flex-end;
    }

    /* ===== FORMS ===== */
    .form-group {
      margin-bottom: var(--space-6);
    }

    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--fg);
      margin-bottom: var(--space-2);
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: var(--text-base);
      font-family: var(--font-sans);
      color: var(--fg);
      transition: all var(--duration-fast) var(--transition);
    }

    .form-input {
      height: 44px;
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.1);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--muted);
    }

    /* ===== SKELETON LOADING ===== */
    .skeleton-bookmark {
      padding: var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: var(--space-6);
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        oklch(95% 0.006 60) 0%,
        oklch(93% 0.006 60) 50%,
        oklch(95% 0.006 60) 100%
      );
      background-size: 200% 100%;
      animation: skeleton-pulse 1.5s ease-in-out infinite;
      border-radius: 6px;
    }

    @keyframes skeleton-pulse {
      0%, 100% {
        background-position: 200% 0;
      }
      50% {
        background-position: -200% 0;
      }
    }

    .skeleton-title {
      height: 20px;
      width: 70%;
      margin-bottom: var(--space-3);
    }

    .skeleton-url {
      height: 14px;
      width: 40%;
      margin-bottom: var(--space-4);
    }

    .skeleton-description {
      height: 16px;
      width: 100%;
      margin-bottom: var(--space-2);
    }

    .skeleton-tags {
      display: flex;
      gap: var(--space-2);
    }

    .skeleton-tag {
      height: 24px;
      width: 60px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: var(--space-16) var(--space-8);
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-6);
      color: var(--muted);
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-3);
    }

    .empty-state-description {
      font-size: var(--text-base);
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto var(--space-8);
      line-height: 1.6;
    }

    /* ===== UTILITIES ===== */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">
        <div class="logo-icon">📑</div>
        <span>delicious</span>
      </a>

      <div class="search-container">
        <input
          type="search"
          class="search-input"
          id="search-input"
          placeholder="Search links, tags, or users..."
        >
      </div>

      <nav class="nav">
        <div id="guest-nav">
          <button class="btn btn-ghost" id="login-btn">Sign in</button>
          <button class="btn btn-primary" id="register-btn">Get started</button>
        </div>

        <div id="auth-nav">
          <button class="btn btn-primary" id="new-bookmark-btn">+ New link</button>
          <button class="btn btn-secondary" id="profile-btn">
            <span id="username-display"></span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">
    <div class="layout">

      <!-- FEED -->
      <div class="feed">
        <div class="feed-controls">
          <div class="filter-tabs">
            <button class="filter-tab active" data-feed="all">All links</button>
            <button class="filter-tab" data-feed="mine" style="display: none;">My links</button>
          </div>
        </div>

        <!-- BOOKMARK LIST -->
        <div class="bookmark-list" id="bookmark-list">
          <!-- Loading skeleton -->
          <div class="skeleton-bookmark">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-url"></div>
            <div class="skeleton skeleton-description"></div>
            <div class="skeleton-tags">
              <div class="skeleton skeleton-tag"></div>
              <div class="skeleton skeleton-tag"></div>
              <div class="skeleton skeleton-tag"></div>
            </div>
          </div>
        </div>

        <!-- PAGINATION -->
        <div class="pagination" id="pagination">
          <button class="btn btn-secondary pagination-btn" id="prev-btn" disabled>←</button>
          <span class="pagination-info" id="pagination-info">Page 1 of 1</span>
          <button class="btn btn-secondary pagination-btn" id="next-btn" disabled>→</button>
        </div>
      </div>

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-title">Popular tags</h3>
          <div class="popular-tags" id="popular-tags">
            <div class="skeleton" style="height: 44px;"></div>
            <div class="skeleton" style="height: 44px; width: 90%;"></div>
            <div class="skeleton" style="height: 44px; width: 85%;"></div>
          </div>
        </div>

        <div class="sidebar-section">
          <h3 class="sidebar-title">Quick save</h3>
          <p style="font-size: var(--text-sm); color: var(--muted); line-height: 1.6; margin-bottom: var(--space-4);">
            Drag this button to your bookmarks bar:
          </p>
          <a
            href="javascript:(function(){window.open('http://localhost:3000?url='+encodeURIComponent(window.location.href)+'&title='+encodeURIComponent(document.title),'_blank','width=600,height=500');})();"
            class="btn btn-secondary"
            style="width: 100%;"
            onclick="event.preventDefault(); alert('Drag this button to your bookmarks bar!');">
            + delicious
          </a>
        </div>
      </aside>
    </div>
  </main>

  <!-- AUTH MODAL -->
  <div class="modal" id="auth-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="auth-modal-title">Sign in</h2>
      </div>
      <div class="modal-body">
        <form id="auth-form">
          <div class="form-group">
            <label class="form-label" for="auth-username">Username</label>
            <input
              type="text"
              class="form-input"
              id="auth-username"
              placeholder="your-username"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="auth-password">Password</label>
            <input
              type="password"
              class="form-input"
              id="auth-password"
              placeholder="••••••••"
              required
            >
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="auth-modal-close">Cancel</button>
        <button class="btn btn-primary" id="auth-submit">Sign in</button>
      </div>
    </div>
  </div>

  <!-- BOOKMARK MODAL -->
  <div class="modal" id="bookmark-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Add new link</h2>
      </div>
      <div class="modal-body">
        <form id="bookmark-form">
          <div class="form-group">
            <label class="form-label" for="bookmark-url">URL</label>
            <input
              type="url"
              class="form-input"
              id="bookmark-url"
              placeholder="https://example.com"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="bookmark-title">Title</label>
            <input
              type="text"
              class="form-input"
              id="bookmark-title"
              placeholder="A great article"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="bookmark-description">Description</label>
            <textarea
              class="form-textarea"
              id="bookmark-description"
              placeholder="What's this about?"
            ></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="bookmark-tags">Tags</label>
            <input
              type="text"
              class="form-input"
              id="bookmark-tags"
              placeholder="design, frontend, inspiration (comma-separated)"
            >
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="bookmark-modal-close">Cancel</button>
        <button class="btn btn-primary" id="bookmark-submit">Save link</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
