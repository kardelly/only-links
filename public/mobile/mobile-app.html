<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2440B9">
  <meta name="description" content="Social bookmarking, reimagined">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OnlyLinks">

  <title>only.link - Mobile</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" href="/favicon-192.png">

  <!-- Theme engine: apply before render to prevent flash -->
  <script src="/theme.js"></script>

  <!-- Auto clear cache on ?clear=1 param -->
  <script>
    if (window.location.search.includes('clear=1')) {
      (async function() {
        console.log('[Clear] Clearing all caches...');

        // Unregister service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (let registration of registrations) {
            await registration.unregister();
            console.log('[Clear] Unregistered SW:', registration.scope);
          }
        }

        // Clear caches
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          for (let cacheName of cacheNames) {
            await caches.delete(cacheName);
            console.log('[Clear] Deleted cache:', cacheName);
          }
        }

        // Clear storage
        localStorage.clear();
        sessionStorage.clear();

        console.log('[Clear] Done! Reloading...');

        // Reload without the clear parameter
        setTimeout(() => {
          window.location.href = '/mobile/app';
        }, 1000);
      })();
    }
  </script>

  <!-- Cookie Consent -->
  <link rel="stylesheet" href="/components/cookie-consent.css">

  <!-- Styles -->
  <link rel="stylesheet" href="/mobile/mobile-styles.css">
</head>
<body>

  <!-- App loading screen — shown immediately, hidden after JS init -->
  <div id="app-splash" style="
    position: fixed; inset: 0; z-index: 9999;
    background: #2440B9;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    transition: opacity 400ms ease;
  ">
    <img src="/favicon-maskable.png" alt="OnlyLinks" style="width: 96px; height: 96px; border-radius: 22px;">
    <span style="color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 500; letter-spacing: 0.04em; font-family: -apple-system, sans-serif;">OnlyLinks</span>
  </div>

  <div class="mobile-app">
    <!-- Top Bar -->
    <div class="top-bar">
      <img src="/logo.png" alt="only.link" class="top-bar-logo" id="logo-btn">
      <div class="top-bar-actions">
        <button class="top-bar-login-btn" id="login-btn" style="display: none;">Login</button>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area">
      <!-- Feed View -->
      <div id="feed-view" class="view"></div>

      <!-- Search View -->
      <div id="search-view" class="view"></div>

      <!-- Tags View -->
      <div id="tags-view" class="view"></div>

      <!-- Notifications View -->
      <div id="notifications-view" class="view"></div>

      <!-- Profile View -->
      <div id="profile-view" class="view"></div>

      <!-- Settings View -->
      <div id="settings-view" class="view"></div>

      <!-- Public Profile View (user discovery) -->
      <div id="public-profile-view" class="view"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav"></nav>
  </div>

  <!-- Login options sheet -->
  <div class="edit-sheet-backdrop" id="login-sheet-backdrop">
    <div class="edit-sheet" style="padding-bottom: max(32px, env(safe-area-inset-bottom));">
      <div class="edit-sheet-handle"></div>
      <h3 class="edit-sheet-title" style="text-align:center;">Sign in to OnlyLinks</h3>
      <p style="font-size:14px;color:var(--text-secondary);text-align:center;margin:0 0 24px;line-height:1.5;">Save links, follow curators, discover the web.</p>

      <a href="/api/auth/google?from=mobile" class="google-login-btn" id="mobile-google-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" style="flex-shrink:0;">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>

      <div class="am-divider" style="margin: 16px 0;"><span style="font-size:12px;color:var(--text-secondary);">or</span></div>

      <a href="/" class="btn btn-secondary" style="display:flex;justify-content:center;text-decoration:none;width:100%;box-sizing:border-box;">
        Sign in with password
      </a>
    </div>
  </div>

  <!-- Cookie Consent Script -->
  <script src="/components/cookie-consent.js"></script>

  <!-- Scripts (as ES modules) -->
  <script type="module" src="/mobile/mobile-app.js"></script>
</body>
</html>
