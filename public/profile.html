<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">User Profile — only.link</title>
  <meta name="description" content="Public profile and bookmarks."  id="page-description">

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png">

  <!-- Google tag (gtag.js) -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/components/header-styles.css">
  <link rel="stylesheet" href="/components/auth-modal-styles.css">
  <link rel="stylesheet" href="/components/shared-styles.css">
  <link rel="stylesheet" href="/components/bookmark-modal-styles.css">

  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Neutrals — warm tint (hue 60 amber) */
      --bg:      oklch(98% 0.008 60);
      --surface: oklch(99.5% 0.004 60);
      --fg:      oklch(18% 0.012 60);
      --muted:   oklch(52% 0.008 60);
      --border:  oklch(92% 0.006 60);

      /* Accent — cobalt blue */
      --accent:  oklch(56% 0.18 250);
      --accent-hover: oklch(51% 0.18 250);
      --accent-subtle: oklch(96% 0.02 250);

      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Helvetica Neue", sans-serif;

      /* Spacing (4px base) */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;

      /* Text scale (1.25 ratio) */
      --text-xs:   13px;
      --text-sm:   14px;
      --text-base: 16px;
      --text-lg:   20px;
      --text-xl:   25px;
      --text-2xl:  31px;

      /* Motion */
      --transition: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 150ms;
      --duration-base: 200ms;
      --duration-slow: 300ms;

      /* Elevation */
      --shadow-sm: 0 1px 3px oklch(18% 0.012 60 / 0.08);
      --shadow-md: 0 4px 12px oklch(18% 0.012 60 / 0.1);
      --shadow-lg: 0 8px 24px oklch(18% 0.012 60 / 0.12);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      height: 40px;
      padding: 0 var(--space-6);
      font-size: var(--text-base);
      font-weight: 600;
      border-radius: 980px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all var(--duration-fast) var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 1px 3px oklch(from var(--accent) l c h / 0.25);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 2px 6px oklch(from var(--accent) l c h / 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface);
      border-color: oklch(88% 0.008 60);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
    }

    .btn-ghost:hover {
      color: var(--fg);
      background: var(--surface);
    }

    .btn-danger {
      background: oklch(54% 0.2 25);
      color: white;
      border: none;
      box-shadow: 0 1px 3px oklch(54% 0.2 25 / 0.25);
    }

    .btn-danger:hover {
      background: oklch(49% 0.22 25);
      transform: translateY(-1px);
    }

    .btn-danger:active {
      transform: translateY(1px) scale(0.98);
    }

    .btn-sm {
      height: 32px;
      padding: 0 var(--space-4);
      font-size: var(--text-sm);
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-6);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: var(--space-12);
      align-items: start;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }

    /* ===== FEED ===== */
    .feed {
      min-height: 60vh;
    }

    .feed-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-8);
    }

    .filter-tabs {
      display: flex;
      gap: var(--space-2);
      padding: var(--space-1);
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .filter-tab {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 600;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--duration-fast) var(--transition);
    }

    .filter-tab:hover {
      color: var(--fg);
    }

    .filter-tab.active {
      background: white;
      color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    /* ===== BOOKMARK ITEMS ===== */
    .bookmark-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .bookmark-item {
      position: relative;
      padding: var(--space-5, 20px) var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      gap: var(--space-4);
      transition: box-shadow var(--duration-fast) var(--transition),
                  border-color var(--duration-fast) var(--transition),
                  transform var(--duration-fast) var(--transition);
    }

    .bookmark-item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
      border-color: oklch(86% 0.008 60);
    }

    .bookmark-thumbnail {
      flex-shrink: 0;
      width: 96px;
      height: 64px;
      border-radius: 8px;
      overflow: hidden;
      background: oklch(94% 0.006 60);
      align-self: flex-start;
      margin-top: 2px;
    }

    .bookmark-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 300ms var(--transition);
    }

    .bookmark-item:hover .bookmark-thumbnail img {
      transform: scale(1.04);
    }

    .bookmark-content {
      flex: 1;
      min-width: 0;
    }

    .bookmark-header {
      margin-bottom: var(--space-2);
    }

    .bookmark-url {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
      display: block;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
      line-height: 1.35;
      transition: color var(--duration-fast) var(--transition);
    }

    .bookmark-url:hover {
      color: var(--accent);
    }

    .bookmark-domain {
      font-size: 12px;
      color: oklch(68% 0.006 60);
      letter-spacing: 0.01em;
    }

    .bookmark-description {
      font-size: var(--text-sm);
      line-height: 1.55;
      color: oklch(42% 0.008 60);
      margin-bottom: var(--space-3);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bookmark-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
      margin-bottom: var(--space-3);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px var(--space-2);
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 980px;
      color: oklch(52% 0.008 60);
      cursor: pointer;
      transition: border-color var(--duration-fast) var(--transition),
                  color var(--duration-fast) var(--transition),
                  background var(--duration-fast) var(--transition);
    }

    .tag:hover {
      border-color: oklch(from var(--accent) 80% 0.08 h);
      color: var(--accent);
      background: oklch(from var(--accent) 97% 0.02 h);
    }

    .bookmark-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 12px;
      color: oklch(62% 0.006 60);
    }

    .bookmark-meta-link {
      color: inherit;
      text-decoration: none;
      transition: color var(--duration-fast) var(--transition);
    }

    .bookmark-meta-link:hover {
      color: var(--accent);
    }

    .bookmark-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: sticky;
      top: calc(64px + var(--space-8));
    }

    .sidebar-section {
      margin-bottom: var(--space-10);
    }

    .sidebar-title {
      font-size: var(--text-base);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-4);
    }

    /* ===== PAGINATION ===== */
    .pagination {
      display: none;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-top: var(--space-12);
      padding-top: var(--space-8);
      border-top: 1px solid var(--border);
    }

    .pagination-info {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .pagination-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pagination-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ===== MODALS ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      animation: modalFadeIn var(--duration-slow) var(--transition);
    }

    .modal.active {
      display: flex;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: oklch(18% 0.012 60 / 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal-content {
      position: relative;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      animation: modalSlideUp var(--duration-slow) var(--transition);
    }

    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      padding: var(--space-6);
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    .modal-body {
      padding: var(--space-6);
    }

    .modal-footer {
      padding: var(--space-6);
      border-top: 1px solid var(--border);
      display: flex;
      gap: var(--space-3);
      justify-content: flex-end;
    }

    /* ===== FORMS ===== */
    .form-group {
      margin-bottom: var(--space-6);
    }

    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--fg);
      margin-bottom: var(--space-2);
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: var(--text-base);
      font-family: var(--font-sans);
      color: var(--fg);
      transition: all var(--duration-fast) var(--transition);
    }

    .form-input {
      height: 44px;
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.1);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--muted);
    }

    /* ===== SKELETON LOADING ===== */
    .skeleton-bookmark {
      padding: var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: var(--space-6);
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        oklch(95% 0.006 60) 0%,
        oklch(93% 0.006 60) 50%,
        oklch(95% 0.006 60) 100%
      );
      background-size: 200% 100%;
      animation: skeleton-pulse 1.5s ease-in-out infinite;
      border-radius: 6px;
    }

    @keyframes skeleton-pulse {
      0%, 100% {
        background-position: 200% 0;
      }
      50% {
        background-position: -200% 0;
      }
    }

    .skeleton-title {
      height: 20px;
      width: 70%;
      margin-bottom: var(--space-3);
    }

    .skeleton-url {
      height: 14px;
      width: 40%;
      margin-bottom: var(--space-4);
    }

    .skeleton-description {
      height: 16px;
      width: 100%;
      margin-bottom: var(--space-2);
    }

    .skeleton-tags {
      display: flex;
      gap: var(--space-2);
    }

    .skeleton-tag {
      height: 24px;
      width: 60px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: var(--space-16) var(--space-8);
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-6);
      color: var(--muted);
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-3);
    }

    .empty-state-description {
      font-size: var(--text-base);
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto var(--space-8);
      line-height: 1.6;
    }

    /* ===== TOGGLE SWITCH ===== */
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .toggle-label {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--fg);
    }

    .toggle-description {
      font-size: var(--text-sm);
      color: var(--muted);
      margin-top: var(--space-1);
    }

    .toggle-switch {
      position: relative;
      width: 51px;
      height: 31px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--border);
      transition: all var(--duration-fast) var(--transition);
      border-radius: 980px;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 27px;
      width: 27px;
      left: 2px;
      bottom: 2px;
      background: white;
      transition: all var(--duration-fast) var(--transition);
      border-radius: 50%;
      box-shadow: 0 1px 3px oklch(18% 0.012 60 / 0.2);
    }

    input:checked + .toggle-slider {
      background: var(--accent);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    input:focus + .toggle-slider {
      box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.1);
    }

    /* ===== PROFILE HEADER ===== */
    .profile-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-6);
      padding: var(--space-8) 0 var(--space-10);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-10);
    }

    .profile-avatar-wrap {
      flex-shrink: 0;
      position: relative;
    }

    .profile-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: oklch(92% 0.02 250);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border), 0 2px 8px oklch(18% 0.012 60 / 0.08);
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-avatar-initial {
      font-size: 36px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
      padding-top: 4px;
    }

    .profile-identity {
      display: flex;
      align-items: baseline;
      gap: var(--space-4);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }

    .profile-username {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--fg);
      line-height: 1.15;
      margin: 0;
    }

    .profile-stats {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0;
      margin-bottom: var(--space-2);
    }

    .profile-stat {
      display: flex;
      align-items: baseline;
      gap: 4px;
      padding-right: var(--space-4);
      margin-right: var(--space-4);
      border-right: 1px solid var(--border);
      color: var(--muted);
      font-size: var(--text-sm);
      white-space: nowrap;
    }

    .profile-stat:last-child {
      border-right: none;
      padding-right: 0;
      margin-right: 0;
    }

    .profile-stat-value {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--fg);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    .profile-stat-link {
      display: flex;
      align-items: baseline;
      gap: 4px;
      color: var(--muted);
      text-decoration: none;
      transition: color var(--duration-fast) var(--transition);
    }

    .profile-stat-link:hover {
      color: var(--accent);
    }

    .profile-stat-link:hover .profile-stat-value {
      color: var(--accent);
    }

    .profile-joined {
      font-size: var(--text-sm);
      color: oklch(62% 0.006 60);
      margin-top: var(--space-2);
    }

    .profile-joined strong {
      color: var(--muted);
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .profile-header {
        gap: var(--space-4);
        padding: var(--space-6) 0 var(--space-8);
      }

      .profile-avatar {
        width: 72px;
        height: 72px;
      }

      .profile-avatar-initial {
        font-size: 28px;
      }

      .profile-username {
        font-size: var(--text-lg);
      }

      .profile-stat {
        padding-right: var(--space-3);
        margin-right: var(--space-3);
        font-size: 12px;
      }

      .profile-stat-value {
        font-size: var(--text-sm);
      }
    }

    /* ===== STAT LINKS (legacy) ===== */
    .stat-link {
      color: inherit;
      text-decoration: none;
      transition: color var(--duration-fast) var(--transition);
      cursor: pointer;
    }

    .stat-link:hover {
      color: var(--accent);
    }

    /* ===== UTILITIES ===== */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- AUTH MODAL -->
  <div id="auth-modal-placeholder"></div>

  <!-- MAIN CONTENT -->
  <main class="container">
    <!-- PROFILE HEADER -->
    <div class="profile-header">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="user-profile-avatar">
          <span class="profile-avatar-initial" id="user-profile-avatar-initial">U</span>
        </div>
      </div>

      <div class="profile-info">
        <div class="profile-identity">
          <h1 class="profile-username" id="profile-username">Loading...</h1>
          <button id="follow-btn" class="btn btn-primary" style="display: none;">Follow</button>
        </div>

        <div class="profile-stats" id="profile-stats">
          <div class="profile-stat">
            <span class="profile-stat-value" id="stats-bookmarks">0</span>
            <span>bookmarks</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-value" id="stats-tags">0</span>
            <span>tags</span>
          </div>
          <a href="#" id="followers-link" class="profile-stat profile-stat-link">
            <span class="profile-stat-value" id="stats-followers">0</span>
            <span>followers</span>
          </a>
          <a href="#" id="following-link" class="profile-stat profile-stat-link">
            <span class="profile-stat-value" id="stats-following">0</span>
            <span>following</span>
          </a>
        </div>

        <p class="profile-joined">Joined <strong id="stats-joined">...</strong></p>
      </div>
    </div>

    <div class="layout">

      <!-- FEED -->
      <div class="feed">

        <!-- BOOKMARK LIST -->
        <div class="bookmark-list" id="bookmark-list">
          <!-- Loading skeleton -->
          <div class="skeleton-bookmark">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-url"></div>
            <div class="skeleton skeleton-description"></div>
            <div class="skeleton-tags">
              <div class="skeleton skeleton-tag"></div>
              <div class="skeleton skeleton-tag"></div>
              <div class="skeleton skeleton-tag"></div>
            </div>
          </div>
        </div>

        <!-- LOAD MORE BUTTON -->
        <div style="display: flex; justify-content: center; padding: var(--space-8) 0;">
          <button id="load-more-btn" class="btn btn-secondary" style="display: none;">
            Load more
          </button>
        </div>
      </div>

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div id="sidebar-tags-placeholder"></div>

        <div class="sidebar-section">
          <h3 class="sidebar-title">Quick save</h3>
          <p style="font-size: var(--text-sm); color: var(--muted); line-height: 1.6; margin-bottom: var(--space-4);">
            Drag this button to your bookmarks bar:
          </p>
          <a
            href="javascript:(function(){window.open('http://localhost:3000?url='+encodeURIComponent(window.location.href)+'&title='+encodeURIComponent(document.title),'_blank','width=600,height=500');})();"
            class="btn btn-secondary"
            style="width: 100%;"
            onclick="event.preventDefault(); alert('Drag this button to your bookmarks bar!');">
            + only.link
          </a>
        </div>
      </aside>
    </div>
  </main>

  <!-- DELETE CONFIRMATION MODAL -->
  <div class="modal" id="delete-confirmation-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2 class="modal-title">Delete bookmark?</h2>
      </div>
      <div class="modal-body" style="padding-top: var(--space-4); padding-bottom: var(--space-4);">
        <p style="font-size: var(--text-sm); color: var(--muted); line-height: 1.6;">
          This will permanently delete this bookmark. This action cannot be undone.
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm delete-cancel" id="delete-cancel-btn">Cancel</button>
        <button class="btn btn-danger btn-sm" id="delete-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div class="modal" id="auth-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="auth-modal-title">Sign in</h2>
      </div>
      <div class="modal-body">
        <form id="auth-form">
          <div class="form-group">
            <label class="form-label" for="auth-username">Username</label>
            <input
              type="text"
              class="form-input"
              id="auth-username"
              placeholder="your-username"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="auth-password">Password</label>
            <input
              type="password"
              class="form-input"
              id="auth-password"
              placeholder="••••••••"
              required
            >
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="auth-modal-close">Cancel</button>
        <button class="btn btn-primary" id="auth-submit">Sign in</button>
      </div>
    </div>
  </div>

  <!-- BOOKMARK MODALS -->
  <div id="bookmark-modals-placeholder"></div>

  <!-- FOLLOWERS/FOLLOWING MODAL -->
  <div class="modal" id="users-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="users-modal-title">Followers</h2>
      </div>
      <div class="modal-body">
        <div id="users-list" style="display: flex; flex-direction: column; gap: var(--space-4);">
          <!-- User items will be rendered here -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="users-modal-close">Close</button>
      </div>
    </div>
  </div>

  <script src="/components/session.js"></script>
  <script src="/components/header.js"></script>
  <script src="/components/auth-modal.js"></script>
  <script src="/components/bookmark-modals.js"></script>
  <script src="/components/sidebar-tags.js"></script>
  <script src="/profile.js"></script>
</body>
</html>
